# We Designerz — self-hosted Supabase + Umami на RU-VPS (T-LOC, docs/14-ru-compliance.md).
#
# Урезано из официального supabase/docker (github.com/supabase/supabase, папка
# docker/): оставлены только сервисы, которыми реально пользуется фронт —
# db, kong, auth (GoTrue), rest (PostgREST), storage+imgproxy, meta.
# НЕ включены (не используются): realtime, edge functions, logflare/analytics,
# vector, supavisor (pooler — прямое подключение к db, нагрузка мизерная).
#
# Studio (админ-UI Supabase) не входит в постоянный стек — экономия RAM и меньше
# поверхность атаки. Он запускается только по требованию через
# docker-compose.studio.yml и SSH-туннель (см. RUNBOOK.md), не проксируется
# через kong/Caddy и после закрытия туннеля останавливается.
#
# Наружу торчит только Caddy (80/443). kong и umami видны друг другу и Caddy
# только по внутренней docker-сети — портов на хост не публикуют.
#
# Запуск:  docker compose up -d
# Логи:    docker compose logs -f <сервис>
# Стоп:    docker compose down   (данные остаются в ./volumes)

name: vibeclub

services:

  db:
    container_name: vibeclub-db
    image: supabase/postgres:17.6.1.144@sha256:446705834e4366ec908d424f017b3cc0b201547d8c7085235838c76a10c5baf5
    restart: unless-stopped
    volumes:
      # Роли и JWT-настройки — минимальный набор init-скриптов официального
      # образа (без realtime/webhooks/logflare/pooler — эти схемы не нужны
      # без соответствующих сервисов).
      - ./volumes/db/roles.sql:/docker-entrypoint-initdb.d/init-scripts/99-roles.sql:Z
      - ./volumes/db/jwt.sql:/docker-entrypoint-initdb.d/init-scripts/99-jwt.sql:Z
      - ./volumes/db/umami.sql:/docker-entrypoint-initdb.d/init-scripts/96-umami.sql:Z
      - ./volumes/db/auth-fn-owner.sql:/docker-entrypoint-initdb.d/migrations/zz-auth-fn-owner.sql:Z
      - ./volumes/db/data:/var/lib/postgresql/data:Z
      - db-config:/etc/postgresql-custom
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: ${POSTGRES_PORT}
      POSTGRES_PORT: ${POSTGRES_PORT}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: ${JWT_EXPIRY}
      UMAMI_DB_PASSWORD: ${UMAMI_DB_PASSWORD}
    command:
      [
        "postgres",
        "-c", "config_file=/etc/postgresql/postgresql.conf",
        "-c", "log_min_messages=fatal"
      ]

  kong:
    container_name: vibeclub-kong
    image: kong/kong:3.9.3@sha256:9a2ae6699a2ce0d60592eb176555d3594a22782c20cc6557a61ff3a7e8b559a3
    restart: unless-stopped
    depends_on:
      captcha-bridge:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./volumes/api/kong.yml:/home/kong/temp.yml:ro,z
      - ./volumes/api/kong-entrypoint.sh:/home/kong/kong-entrypoint.sh:ro,z
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/kong.yml
      KONG_ROUTER_FLAVOR: expressions
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_DNS_NOT_FOUND_TTL: 1
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,post-function
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      KONG_PROXY_ACCESS_LOG: /dev/stdout combined
      # Легаси-модель ключей (HS256 JWT) — опаковые SUPABASE_PUBLISHABLE_KEY/
      # SECRET_KEY не используем, kong-entrypoint.sh сам падает на legacy-режим.
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
    entrypoint: ["/bin/sh", "/home/kong/kong-entrypoint.sh"]

  auth:
    container_name: vibeclub-auth
    image: supabase/gotrue:v2.193.0@sha256:ac6d4b1e961ae5a1a24d283967485f8195b767a8476e1044959d7a250c2da3f0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      timeout: 5s
      interval: 5s
      retries: 3
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}

      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}

      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS}
      GOTRUE_DISABLE_SIGNUP: ${DISABLE_SIGNUP}
      # CAPTCHA проверяет внутренний captcha-bridge перед GoTrue. Provider и
      # secret оставлены рядом только для точного rollback из RUNBOOK.md.
      GOTRUE_SECURITY_CAPTCHA_ENABLED: "false"
      GOTRUE_SECURITY_CAPTCHA_PROVIDER: turnstile
      GOTRUE_SECURITY_CAPTCHA_SECRET: ${CAPTCHA_SECRET}
      GOTRUE_PASSWORD_MIN_LENGTH: "12"
      # Дефолт GoTrue — 30 писем/час на весь инстанс: при наплыве с YouTube
      # 31-я регистрация за час падает. Поднято перед анонсом 2026-07-18.
      GOTRUE_RATELIMIT_EMAIL_SENT: "360"

      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXPIRY}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_ISSUER: ${API_EXTERNAL_URL}

      # Только email+пароль (149-ФЗ: иностранный OAuth не добавляем, T1/14-ru-compliance.md).
      GOTRUE_EXTERNAL_EMAIL_ENABLED: ${ENABLE_EMAIL_SIGNUP}
      GOTRUE_EXTERNAL_ANONYMOUS_USERS_ENABLED: "false"
      GOTRUE_MAILER_AUTOCONFIRM: ${ENABLE_EMAIL_AUTOCONFIRM}
      GOTRUE_EXTERNAL_PHONE_ENABLED: "false"

      # SMTP — Unisender Go (замена Resend, домен mail.wedesignerz.com).
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL}
      GOTRUE_SMTP_HOST: ${SMTP_HOST}
      GOTRUE_SMTP_PORT: ${SMTP_PORT}
      GOTRUE_SMTP_USER: ${SMTP_USER}
      GOTRUE_SMTP_PASS: ${SMTP_PASS}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME}
      GOTRUE_MAILER_URLPATHS_INVITE: ${MAILER_URLPATHS_INVITE}
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: ${MAILER_URLPATHS_CONFIRMATION}
      GOTRUE_MAILER_URLPATHS_RECOVERY: ${MAILER_URLPATHS_RECOVERY}
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: ${MAILER_URLPATHS_EMAIL_CHANGE}

      # Кастомные шаблоны писем (T21 в Cloud) — тексты в ./mail-templates.
      # GoTrue умеет забирать шаблоны ТОЛЬКО по HTTP(S) (файловый путь молча
      # игнорируется с откатом на дефолтный английский шаблон), поэтому их
      # раздаёт Caddy: /mail-templates/* → ./mail-templates (см. Caddyfile).
      # Эти GOTRUE_MAILER_TEMPLATES_*/SUBJECTS_* используются, только если
      # send-email hook ниже недоступен/выключен (GoTrue делает on/off
      # переключение через Hook.SendEmail.Enabled, SMTP-путь остаётся
      # фолбэком в конфиге) — реально письма сейчас идут через hook →
      # mail-bridge, потому что SMTP-порты Unisender Go недоступны с VPS
      # (см. RUNBOOK.md, шаг 6, диагностика 2026-07-14).
      GOTRUE_MAILER_SUBJECTS_CONFIRMATION: ${MAILER_SUBJECTS_CONFIRMATION}
      GOTRUE_MAILER_TEMPLATES_CONFIRMATION: ${SUPABASE_PUBLIC_URL}/mail-templates/confirmation.html
      GOTRUE_MAILER_SUBJECTS_RECOVERY: ${MAILER_SUBJECTS_RECOVERY}
      GOTRUE_MAILER_TEMPLATES_RECOVERY: ${SUPABASE_PUBLIC_URL}/mail-templates/recovery.html
      GOTRUE_MAILER_SUBJECTS_EMAIL_CHANGE: ${MAILER_SUBJECTS_EMAIL_CHANGE}
      GOTRUE_MAILER_TEMPLATES_EMAIL_CHANGE: ${SUPABASE_PUBLIC_URL}/mail-templates/email_change.html

      # Send-email hook — обходит SMTP совсем (SMTP-порты Unisender Go
      # недоступны по TCP с VPS, см. RUNBOOK.md шаг 6). GoTrue валидирует
      # http://-хуки ТОЛЬКО для хостов localhost/127.0.0.1/::1/
      # host.docker.internal (internal/conf/configuration.go,
      # ValidateExtensibilityPoint) — обычное имя сервиса вида
      # "http://mail-bridge:9998/" GoTrue при старте отклоняет
      # (`only localhost, 127.0.0.1, and ::1 are supported with http`,
      # проверено живьём). Поэтому mail-bridge ниже сидит в СЕТЕВОМ
      # НЕЙМСПЕЙСЕ auth (network_mode: service:auth) — для auth это и есть
      # 127.0.0.1:9998, наружу и на остальные сервисы (в т.ч. под именем
      # "auth" для kong) это никак не влияет. Именно 127.0.0.1, не
      # "localhost": /etc/hosts в образе резолвит localhost и в 127.0.0.1,
      # и в ::1, а сервер в server.mjs слушает только IPv4 — через ::1
      # запрос уходит в "connection refused" (поймано живьём).
      GOTRUE_HOOK_SEND_EMAIL_ENABLED: "true"
      GOTRUE_HOOK_SEND_EMAIL_URI: http://127.0.0.1:9998/
      GOTRUE_HOOK_SEND_EMAIL_SECRETS: ${SEND_EMAIL_HOOK_SECRET}

  captcha-bridge:
    # Внутренний gateway CAPTCHA -> GoTrue. Порт не публикуется: снаружи
    # доступен только Kong, который направляет сюда secure Auth routes.
    container_name: vibeclub-captcha-bridge
    image: node:22.23.1-alpine@sha256:16e22a550f3863206a3f701448c45f7912c6896a62de43add43bb9c86130c3e2
    restart: unless-stopped
    depends_on:
      auth:
        condition: service_healthy
    command: ["node", "/app/server.mjs"]
    volumes:
      - ./captcha-bridge/server.mjs:/app/server.mjs:ro,z
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9997/health"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s
    environment:
      PORT: 9997
      AUTH_UPSTREAM_URL: http://auth:9999
      CAPTCHA_SECRET: ${CAPTCHA_SECRET}
      SMARTCAPTCHA_SERVER_KEY: ${SMARTCAPTCHA_SERVER_KEY}
      SMARTCAPTCHA_ALLOWED_HOSTS: ${SMARTCAPTCHA_ALLOWED_HOSTS}
      CAPTCHA_VERIFY_TIMEOUT_MS: ${CAPTCHA_VERIFY_TIMEOUT_MS:-6000}

  mail-bridge:
    # Мост GoTrue send-email hook → Unisender Go Web API (RUNBOOK.md шаг 6).
    # Без Dockerfile: голый node:22-alpine + bind-mount server.mjs. Только
    # stdlib (fetch встроен в Node 18+) — см. комментарий в server.mjs.
    # network_mode: service:auth — см. комментарий у GOTRUE_HOOK_SEND_EMAIL_URI
    # выше. Порт 9998 не публикуется НИКУДА (ни на хост, ни на docker-сеть
    # под собственным именем) — виден только auth через loopback общего
    # неймспейса. depends_on не нужен: network_mode: service:auth сам
    # заставляет Compose поднять auth первым.
    container_name: vibeclub-mail-bridge
    image: node:22.23.1-alpine@sha256:16e22a550f3863206a3f701448c45f7912c6896a62de43add43bb9c86130c3e2
    restart: unless-stopped
    network_mode: "service:auth"
    command: ["node", "/app/server.mjs"]
    volumes:
      - ./mail-bridge/server.mjs:/app/server.mjs:ro,z
      - ./mail-templates:/app/mail-templates:ro,z
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9998/health"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s
    environment:
      PORT: 9998
      # server.mjs по умолчанию ищет шаблоны в ../mail-templates от своего
      # расположения (верно для локального запуска из infra/mail-bridge/) —
      # в контейнере же оба bind-mount'а плоские внутри /app, путь другой.
      MAIL_TEMPLATES_DIR: /app/mail-templates
      SEND_EMAIL_HOOK_SECRET: ${SEND_EMAIL_HOOK_SECRET}
      UNISENDER_API_URL: ${UNISENDER_API_URL}
      UNISENDER_API_KEY: ${UNISENDER_API_KEY}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
      API_EXTERNAL_BASE: ${API_EXTERNAL_BASE}
      MAILER_SUBJECTS_CONFIRMATION: ${MAILER_SUBJECTS_CONFIRMATION}
      MAILER_SUBJECTS_RECOVERY: ${MAILER_SUBJECTS_RECOVERY}
      MAILER_SUBJECTS_EMAIL_CHANGE: ${MAILER_SUBJECTS_EMAIL_CHANGE}

  rest:
    container_name: vibeclub-rest
    image: postgrest/postgrest:v14.15@sha256:2f8e7b656f09db697a8875177694b417b35cb76c21370de07fc54e711e902326
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "postgrest", "--ready"]
      interval: 5s
      timeout: 5s
      retries: 3
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_MAX_ROWS: ${PGRST_DB_MAX_ROWS:-1000}
      PGRST_DB_EXTRA_SEARCH_PATH: public
      PGRST_DB_ANON_ROLE: anon
      # Без admin-сервера healthcheck `postgrest --ready` всегда красный.
      PGRST_ADMIN_SERVER_PORT: 3001
      PGRST_ADMIN_SERVER_HOST: localhost
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY}
    command: ["postgrest"]

  storage:
    container_name: vibeclub-storage
    image: supabase/storage-api:v1.66.2@sha256:795b5b493fe4d57809165d50346f271182fb288f7ea9279e9f16aab1b81a8c59
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_started
      imgproxy:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://storage:5000/status"]
      timeout: 5s
      interval: 5s
      retries: 3
      start_period: 10s
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      AUTH_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      STORAGE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL}
      REQUEST_ALLOW_X_FORWARDED_PATH: "true"
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      GLOBAL_S3_BUCKET: stub
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://imgproxy:5001
      S3_PROTOCOL_ACCESS_KEY_ID: ${S3_PROTOCOL_ACCESS_KEY_ID}
      S3_PROTOCOL_ACCESS_KEY_SECRET: ${S3_PROTOCOL_ACCESS_KEY_SECRET}
    volumes:
      - ./volumes/storage:/var/lib/storage:z

  imgproxy:
    container_name: vibeclub-imgproxy
    image: darthsim/imgproxy:v3.31.4@sha256:73c5dda13199745b0d2d00e4149d4a589c5b2e205dbf335ca05eca8276b54712
    restart: unless-stopped
    volumes:
      - ./volumes/storage:/var/lib/storage:z
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      timeout: 5s
      interval: 5s
      retries: 3
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_AUTO_WEBP: "true"
      IMGPROXY_MAX_SRC_RESOLUTION: 16.8

  meta:
    # Не проксируется через kong/Caddy — только для будущего локального Studio
    # за ssh-туннелем (docker compose exec / port-forward, не публичный доступ).
    container_name: vibeclub-meta
    image: supabase/postgres-meta:v0.96.6@sha256:a84cc713585eea7b401e4a2561ec4a1e48c87083d1c7ecb4502f204bb4391300
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: ${POSTGRES_HOST}
      PG_META_DB_PORT: ${POSTGRES_PORT}
      PG_META_DB_NAME: ${POSTGRES_DB}
      PG_META_DB_USER: postgres
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
      CRYPTO_KEY: ${PG_META_CRYPTO_KEY}

  umami:
    container_name: vibeclub-umami
    # Тег обязательно postgresql-* (вариант под Postgres); v3 у Umami нет,
    # актуальная ветка — 2.x (проверено по ghcr.io/v2/.../tags/list).
    image: ghcr.io/umami-software/umami:postgresql-v2.20.2@sha256:950133e4158949061b84fa29ce1a87f734655dca5a49a08e727eb23c4e3582cd
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3000/api/heartbeat').then((r) => {if (r.status !== 200) throw new Error(r.status)})\""
        ]
      timeout: 5s
      interval: 10s
      retries: 5
      start_period: 15s
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD}@db:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET}

  caddy:
    # Единственный сервис с портами наружу — TLS-терминация + reverse proxy.
    # Сертификаты Let's Encrypt получает и обновляет сам (ACME HTTP-01).
    container_name: vibeclub-caddy
    image: caddy:2.11.4-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
    restart: unless-stopped
    depends_on:
      kong:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./mail-templates:/srv/mail-templates:ro
      - ./volumes/backup-health:/srv/backup-health:ro
      # Static releases приходят только через непривилегированного deploy-user.
      # 8080 остаётся только внутренним listener Caddy и не публикуется на host.
      - /srv/wedesignerz:/srv/wedesignerz:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  db-config:
  caddy-data:
  caddy-config:
