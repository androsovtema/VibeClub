# Supabase Studio — закрытый операторский UI для production.
# Запускается только по требованию через infra/scripts/open-studio.sh.
# Порт опубликован строго на loopback VPS и доступен с Mac только по SSH-туннелю.
services:
  studio:
    container_name: vibeclub-studio
    image: supabase/studio:2026.07.07-sha-a6a04f2@sha256:c93ea0e057db350dbd20c6b58f7be53f79454c916f6226692c07ff2c215c1615
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
      meta:
        condition: service_started
      kong:
        condition: service_started
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3000/api/platform/profile').then((r) => {if (r.status !== 200) throw new Error(r.status)})\""
        ]
      timeout: 10s
      interval: 5s
      retries: 3
      start_period: 20s
    environment:
      HOSTNAME: "0.0.0.0"

      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER_READ_WRITE: postgres
      PG_META_CRYPTO_KEY: ${PG_META_CRYPTO_KEY}

      PGRST_DB_SCHEMAS: public
      PGRST_DB_MAX_ROWS: ${PGRST_DB_MAX_ROWS:-1000}
      PGRST_DB_EXTRA_SEARCH_PATH: public

      DEFAULT_ORGANIZATION_NAME: ${STUDIO_DEFAULT_ORGANIZATION:-We Designerz}
      DEFAULT_PROJECT_NAME: ${STUDIO_DEFAULT_PROJECT:-VibeClub Production}

      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}

      ENABLED_FEATURES_LOGS_ALL: "false"
      SNIPPETS_MANAGEMENT_FOLDER: /app/snippets
    volumes:
      - ./volumes/snippets:/app/snippets:z
